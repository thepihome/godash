name = "gobunnyy-backend"
main = "worker.js"
compatibility_date = "2024-01-01"

# D1 Database bindings
# Primary app database
[[d1_databases]]
binding = "DB"
database_name = "godashprodcore01"
database_id = "c1a7e500-7dfb-4113-9234-eccdee6b55bc"

# External registrations database
[[d1_databases]]
binding = "REGISTER_DB"
database_name = "gowebprodcore"
database_id = "32a0b7d7-0725-4afd-9dcb-a7a7b2aa5f8d"

# R2 Bucket binding for file uploads
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "resume-uploads"

# Environment variables (set via wrangler secret put or in dashboard)
# JWT_SECRET - set via: wrangler secret put JWT_SECRET
# JWT_EXPIRE - set via: wrangler secret put JWT_EXPIRE
# FRONTEND_URL - set via: wrangler secret put FRONTEND_URL
# GOOGLE_CLIENT_ID - your Google OAuth 2.0 Web client ID (for Google Sign-In)
# Set via: wrangler secret put GOOGLE_CLIENT_ID

[env.production]
# Production-specific settings can go here

